.build:
  stage: build
  image: node:24
  artifacts:
    paths:
      - build
  script:
    - |
      echo "********************************************"
      echo "Build details"
      echo "============================================"
      echo "Running build for ${ENV}"
      echo "********************************************"
    - npm ci
    - npm run build

build-staging:
  extends: .build
  variables:
    TARGET_BRANCH: develop

build-production:
  extends: .build
  before_script:
    - export ENV=PRODUCTION
  variables:
    TARGET_BRANCH: main
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
