.lint:
  stage: lint
  image: node:20
  script:
    - npm ci --include=dev
    - npm run lint
    - npm run lint:mdx
    - npx @redocly/cli lint openapi/root.yml
  allow_failure: true
  rules:
    - if: '($CI_PIPELINE_SOURCE == "schedule" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $TARGET_BRANCH )'
      when: on_success

lint-staging:
  extends: .lint
  variables:
    TARGET_BRANCH: feature/PB-49957

lint-production:
  extends: .lint
  variables:
    TARGET_BRANCH: main
